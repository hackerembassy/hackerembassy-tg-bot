        help: |
            ✉️ За допомогою цієї команди можна зробити кастомне повідомлення із зображенням та кнопками. Приклад:

            #`/custom Some text

            [{"text":"link","url":"https://hackem.cc"}]
            [{"text":"public cmd","cmd":"join"},{"text":"private cmd","bot":"join"}]#`

            Підказки:
            - Для надсилання зображення потрібно додати команду в підпис до прикріпленого зображення
            - Результат можна скопіювати в будь-який чат через reply за допомогою #`/copy chatname_or_id#`
