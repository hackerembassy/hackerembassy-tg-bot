    info:
        text: |
            📚 Тут можна почитати про нас.
            Якщо хочеш дізнатися більше, не соромся, заходь на наш сайт та вікі https://hackem.cc/
        buttons:
            about: 🏠 Про спейс та бота
            join: 🙋‍♀️ Як приєднатися
