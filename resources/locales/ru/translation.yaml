topics:
    general:
        error: ⚠️ Что-то пошло не так
        notfound: ⚠️ Топик не найден
        empty: Пока ничего нет
        nosubscribers: 🌚 Нет подписчиков на топик {{topic}}
    buttons:
        topics: 🗃 Все топики
        subscriptions: 💌 Подписки
    topics:
        list: |
            📭 С помощью этой фичи можно подписаться на рассылку по интересующим тебя топикам.
            Авторы топика смогут легко упоминать тебя в групповых чатах и отправлять тебе личные уведомления.

            🗃 Список доступных топиков:
            {{topics}}

            📟 Команды:
            Посмотреть список доступных топиков - /topics
            Посмотреть текущие подписки - /subscriptions
            Подписаться на рассылку - #`/subscribe topicname#`
            Отписаться от рассылки - #`/unsubscribe topicname#`
            Тегнуть всех подписчиков топика - #`/tag topicname#`
        member: |
            📯 Команды резидентов:
            Добавить топик - #`/addtopic topicname topicdescription#`
            Удалить топик - #`/removetopic topicname#`
            Личные сообщения подписчикам - #`/notify topicname message#`
    subscriptions:
        list: |
            📭 Ты подписан на следующие топики:
            {{topics}}

            📟 Команды:
            Посмотреть список доступных топиков - /topics
            Отписаться от рассылки - #`/unsubscribe topicname#`
        empty: 🗿 Ты не подписан ни на один топик
    subscribe:
        success: |
            📭 Подписка на топик {{topic}} оформлена

            📟 Мои подписки - /subscriptions
        already: |
            👌 Ты уже подписан на топик {{topic}}

            📟 Мои подписки - /subscriptions
        fail: ⚠️ Не удалось подписаться на топик {{topic}}
    unsubscribe:
        success: |
            🗑 Подписка на топик {{topic}} удалена

            📟 Мои подписки - /subscriptions
        notsubscribed: |
            🙅‍♀️ Ты не подписан на топик {{topic}}

            📟 Мои подписки - /subscriptions
        fail: ⚠️ Не удалось отписаться от топика {{topic}}. А ты точно был подписан?
    add:
        success: 📭 Топик {{topic}} добавлен
        exists: 👌 Топик {{topic}} уже существует
        fail: ⚠️ Не удалось добавить топик {{topic}}
    delete:
        success: 🗑 Топик {{topic}} удален
        fail: ⚠️ Не удалось удалить топик {{topic}}
    notify:
        help: |
            📭 С помощью этой команды можно отправить личные сообщение всем подписчикам топика
            #`/notify topicname message#`
        message: |
            📭 Вам сообщение из топика {{topic}}:

            {{text}}

            📟 Мои подписки - /subscriptions
        started: 📯 Рассылка подписчикам {{topic}} начата. Личные сообщения получат {{count}} подписчиков в течение {{eta}} секунд
        finished: ✅ Рассылка подписчикам {{topic}} завершена. Личные сообщения успешно получили {{received}}/{{count}} подписчиков
