basic:
    help: "{{availableCommands}}{{globalModifiers}}"
    about: |
        🏫 Hacker Embassy (Єреванський Хакерспейс) - це простір, де збираються однодумці, захоплені технологіями та творчістю. Ми разом працюємо над проектами, ділимося ідеями та знаннями, просто спілкуємося.

        💻 Ти можеш почитати про нас детальніше на нашому сайті https://hackem.cc/

        📓 Інформацію про наші проекти, обладнання та правила ми зберігаємо на нашій вікі https://lore.hackem.cc/

        🤖 Мій код відкритий та вільний, розробка ведеться на гітхабі: https://github.com/hackerembassy/hackerembassy-tg-bot

        🍕 Ми завжди раді новим резидентам. Хочеш дізнатися, як стати учасником? Тисни команду /join
    issue:
        space:
            help: |
                📮 За допомогою цієї команди можна #*анонімно#* повідомити про будь-яку проблему в спейсі (чогось не вистачає, щось не працює, хтось робить щось дуже неправильне в спейсі).
                Резиденти обов'язково її розглянуть та спробують вирішити.

                Надіслати боту проблему можна, наприклад, ось так:
                #`/issue Погано працює кондиціонер і на другому поверсі дуже спекотно#`
                #`/issue Закінчився туалетний папір#`
                #`/issue Непогано було б мати мапу внутрішньої мережі на вікі#`

                Якщо проблема стосується бота, то краще скористатися командою /bug
            sent: 💌 Проблему надіслано резидентам, вони обов'язково її розглянуть. Дякуємо за допомогу нашій спільноті.
            report: |
                📩 У вас нова проблема!

                "{{issue}}"
        bot:
            help: |
                📮 За допомогою цієї команди можна повідомити про баг у боті.

                Можна створити нову issue на гітхабі, якщо такої ще немає. Або можна надіслати багрепорт прямо в телеграмі, наприклад, ось так:
                #`/bug Мене не чекінить автоматично, коли я приходжу до спейсу#`

                #*Username користувача буде автоматично додано#* до повідомлення, щоб резиденти могли зв'язатися з вами, якщо їм знадобиться додаткова інформація.

                Якщо проблема стосується самого спейсу або його гостей, то краще скористатися командою /issue
            sent: 💌 Багрепорт надіслано мейнтейнерам, вони обов'язково його розглянуть. Дякуємо за допомогу нашій спільноті.
            report: |
                📩 У {{reporter}} з'явилася проблема з ботом! Можливо баг?

                "{{issue}}"
        buttons:
            new: Створити issue на гітхабі
            current: Issues на гітхабі
    residents: |
        👥 Ось вони, наші чудові резиденти:

        {{userList}}
        🧠 Ви можете звернутися до них з будь-якого питання щодо спейсу
    location:
        address: |
            🏫 Наша адреса: Вірменія, Єреван, проспект Баграмяна 60 (вхід з вулиці)
    donate: |
        💸 Хакерспейс не є комерційним проектом і існує виключно на пожертви учасників.
        Ми робимо свій внесок у розвиток спейсу: оплата оренди та комунальних послуг, турбота про простір, допомога у придбанні обладнання.
        Ми будемо раді будь-якій підтримці.

        🫶 Починаючи з певної суми донатів за останні {{period}} місяці ви отримуєте статус нашого спонсора:
        {{sponsorshipTierList}}

        Задонатити нам можна наступними способами:
        💵 Готівкою при зустрічі (найкращий варіант)
          {{donateCashCommand}}
        💰 Криптовалюта
          {{cryptoCommands}}
        💳 Банківська картка Visa/Mastercard Вірменії
          {{donateCardCommand}}
        🛠 Корисне обладнання або витратні матеріали
          {{donateEquipmentCommand}}

        📊 Побачити наші поточні збори та ваш внесок можна за командою {{fundsCommand}}

        💌 З питань донату звертайтеся до наших бухгалтерів, вони допоможуть:
        {{accountantsList}}
    donateCoin: |
        🪙 Використовуй цей QR код або адресу нижче, щоб задонатити нам в {{coin.fullname}}.

        ⚠️ Зверни увагу, що мережа {{coin.network}} і ти використовуєш правильну адресу:
        #`{{coin.address}}#`

        💌 Не забудь написати бухгалтеру перед своїм донатом і скинути код транзакції або посилання
        в {{coin.explorer}} або аналогічному сервісі після

        🛍 Якщо хочеш задонатити натурою (oh my!) або іншим способом - тисни /donate
    donateCash: |
        💌 Щоб пожертвувати таким способом, зв'яжіться з нашими бухгалтерами. З ними ви зможете домовитись про час і місце передачі.

        Ось вони: {{accountantsList}}

        Також, ви можете залишити анонімний донат у коробці на першому поверсі.

        🛍 Якщо ви хочете пожертвувати натурою (ой-ой) або іншим способом - натисніть /donate
    donateCard: |
        💌 Ви можете переказати гроші за одними з запропонованих реквізитів:

        🏢 За номером рахунку: #`{{accountNumber}}#`, #`{{accountHolder}}#`

        💳 За номером картки: `{{cardNumber}}`

        Щоб ваш донат не загубився, зв'яжіться з одним із наших бухгалтерів. Також, ви можете уточнити з ними альтернативний спосіб донату.

        Ось вони: {{accountantsList}}

        🛍 Якщо ви хочете пожертвувати натурою (ой-ой) або іншим способом - натисніть /donate
    donateEquipment: |
        🛠 Якщо у тебе вдома завалявся зайвий 3d принтер, паяльник або інше корисне(!) обладнання, і ти готовий пожертвувати його спейсу (або розшарити для загального користування у нас) ми будемо дуже вдячні прийняти його.

        🗑 Важливо, щоб обладнання або витратні матеріали були в робочому стані або потребували мінімального ремонту і при цьому не належали до категорії "сміття".

        🧙‍♀️ Звертайся до наших резидентів, вони допоможуть з прийняттям обладнання та вирішенням усіх питань.
    join: |
        🧑🏻‍🏫 Якщо ви знаходитесь в Єревані, захоплені технологіями та шукаєте однодумців, заходьте до нас.
        - Ми проводимо регулярний день відкритих дверей щоп'ятниці о 20.00.
        - Щонеділі о 20.00 у нас проходить English Club, де можна попрактикувати свою англійську.
        - Часто по понеділках о 20.00 ми проводимо музичні зустрічі: приносимо гітари, граємо в Rocksmith та джемуємо.
        - В будь-який інший день спейс теж може прийняти гостей, вводь команду {{statusCommand}} щоб дізнатися чи відкритий спейс і чи є там хтось.

        💸 Відвідування вільні (безкоштовні), але будь-які донати на допомогу нашим проектам та оренду дуже вітаються.
        Детальніше можна дізнатися за командою {{donateCommand}}

        🗺 Щоб дізнатися, як нас знайти, тисни {{locationCommand}}

        🔑 Якщо ви хочете стати постійним учасником - повноцінним резидентом спільноти, тобто мати свій ключ, своє місце для зберігання речей (інструменти, сервери тощо), брати участь у прийнятті рішень щодо розвитку спейсу,\
        то наші вимоги прості:
        - Дружелюбність та неконфліктність.
        - Готовність брати участь у житті спільноти.
        - Регулярні пожертви (звісно в межах ваших можливостей).

        🧙🏻‍♂️ Зверніться до будь-якого резидента спейсу, він представить вашу кандидатуру Раді Спейсу.
    events:
        text: |
            🎭 Що у нас відбувається:
            - Майстеркласи та презентації на різні теми від 3D друку, моделювання та паяння до нейромереж, алгоритмів доведення теорем та шибарі. Дату анонсуємо заздалегідь у чатику.
            - Часто по понеділках о 21.00 ми проводимо музичні зустрічі: приносимо гітари, граємо в Rocksmith та джемуємо.
            - Щоп'ятниці о 20.00 у нас традиційний день відкритих дверей, спілкуємося, знайомимося та тусимо.
            - В будь-який інший день спейс теж може прийняти гостей, дивись {{statusCommand}} спейсу, щоб дізнатися більше.

            💸 Відвідування вільні (безкоштовні), але будь-які донати на допомогу нашим проектам та оренду дуже вітаються.
        calendar: |
            🗓 За нашими заходами можна слідкувати в календарику
            {{calendarLink}}
            Підпишись плюсиком ➕ внизу сторінки або візьми {{iCalLink}}
            Або взагалі відкрий календар прямо в телезі {{openCalendarInTelegram}}
            Найближчі заходи можна дізнатися за командою /upcoming, сьогоднішні - за командою /today
        buttons:
            today: 📣 Сьогодні
            upcoming: 📆 Найближчі
        opencalendar: Відкрити календар
        upcoming: |
            🗓 Наші найближчі заходи:
        today: |
            📣 Сьогодні в спейсі проходять заходи:
        todaysimple: |
            Сьогодні в спейсі:
        entrance: |
            🎁 Вхід як завжди вільний, але ми будемо раді будь-яким донатам на підтримку спейсу.
        notoday: |
            🏖 Сьогодні в спейсі запланованих заходів немає.

            Але, якщо спейс відкритий для гостей, то можна просто приходити позайматися цікавими проектами або потусити. Дивись {{statusCommand}} протягом дня.
        error: 📂 Заходи не знайдені
    start:
        text: |
            🇬🇧 Привіт хакерчанине. Я бот для менеджменту всіляких процесів у спейсі.
            [Я знаходжусь в розробці, ти можеш взяти участь у моєму розвитку в репозиторії на гітхабі спейсу, звертайся до #[korn9509#]#(t.me/korn9509#)].

            🔖 Для отримання повного списку команд, доступних тобі, вводь /help. Деякі команди видно тільки резидентам.
            📮 Щось у спейсі не так? Вводь в боті /issue. Це анонімно.
            🐞 Знайшов баг в боті? Вводь /bug.
            🗣 Change bot language / Змінити мову бота - /lang
        buttons:
            status: 📯 Статус
            events: 🗓 Події
            funds: 💸 Збори
            control: 🕹 Керування
            info: 📚 Інфа
            birthdays: 🎉 Дні народження
            needs: 🛍 Потреби
            printers: 🖨 3D Принтери
            topics: 📭 Топіки
            me: 🧙‍♂️ Мій профіль
            help: 📝 Команди
