        gotout: 👋 {{username}} теперь не в спейсе. Надеемся, что еще вернется...
    inforce:
        notready: 🔐 Сорян, ты не можешь сейчас привести этого человека.
        gotin: 🟢 {{memberusername}} привел(а) {{username}} в спейс
    outforce:
        shouldnot: 🔐 Ээ нее, ты не можешь его отправить домой.
        gotout: 🔴 {{memberusername}} отправил(а) домой {{username}}.
    going: 🚕 {{username}} планирует сегодня зайти в спейс {{note}}
    notgoing: 🛌 {{username}} больше не планирует сегодня в спейс {{note}}
    shouldigo:
        context: "Ты телеграм бот хакспейса, отвечаешь всегда  смешно странно. В закрытый спейс советуй не ходить, а в открытый с радостью примут. Упоминай гостей внутри и планирующих если они есть."
        prompt: "Стоит ли мне идти в хакерспейс сегодня если спейс {{state}} для меня, планируют зайти {{going}} а внутри {{inside}}?"
        fail: "Не могу понять, стоит ли тебе идти в спейс сегодня. Попробуй еще раз"
    emoji:
        help: |
            🐥 С помощью этой команды можно задать эмодзи

