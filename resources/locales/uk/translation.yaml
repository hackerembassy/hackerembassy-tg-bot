        gotout: 🔴 {{memberusername}} відправив(ла) додому {{username}}.
    going: 🚕 {{username}} планує сьогодні зайти у спейс {{note}}
    notgoing: 🛌 {{username}} більше не планує сьогодні у спейс {{note}}
    shouldigo:
        context: "Ти телеграм бот хакспейсу, відповідаєш завжди кумедно дивно. В закритий спейс радь не ходити, а у відкритий з радістю приймуть. Згадуй гостей всередині та тих, хто планує, якщо вони є."
        prompt: "Чи варто мені йти в хакспейс сьогодні, якщо спейс {{state}} для мене, планують зайти {{going}} а всередині {{inside}}?"
        fail: "Не можу зрозуміти, чи варто тобі йти в спейс сьогодні. Спробуй ще раз"
    emoji:
        help: |
            🐥 За допомогою цієї команди можна встановити емодзі

            #`/setemoji 🍗#` - Встановити свій емодзі
            #`/setemoji status#` - Подивитися свій встановлений в боті емодзі
            #`/setemoji remove#` - Видалити свій емодзі з бота
        fail: ⚠️ Вкажіть валідний емодзі.
        set: 🐥 Емодзі {{emoji}} успішно встановлено для користувача {{username}}.
        removed: 🗑 Емодзі видалено для користувача {{username}}.
        isset: 🐥 Для користувача {{username}} встановлено емодзі {{emoji}}.
        isnotset: 🐥 Емодзі не встановлено для користувача {{username}}.
    statsof: "🕔 {{username}} за час існування бота (з січня 2023) провів(-ла) у спейсі (на основі відміток)"
    stats:
        start: "🕔 За час існування бота (з січня 2023) ці користувачі провели у спейсі (на основі відміток)"
        invaliddates: "🕔 Не можу зрозуміти дати, спробуй у форматі YYYY-MM-DD"
        nousertimes: "📭 За цей період відмітки не знайдені"
        hoursinspace: "Годин проведено у спейсі з {{from.day}}/{{from.month}}/{{from.year}} по {{to.day}}/{{to.month}}/{{to.year}}"
        period: "🕔 З {{from.day}}/{{from.month}}/{{from.year}} по {{to.day}}/{{to.month}}/{{to.year}} ці користувачі провели у спейсі (на основі відміток)"
        tryautoinside: |
            📲 Хочеш знати точну статистику про себе? Не забувай відмічатися за допомогою /in та /out, а краще використовуй /autoinside, щоб робити це автоматично
        help: |
            ℹ️ Команди статистики:
            • Поточний місяць - /month
            • Попередній місяць - /lastmonth
            • За час існування бота - /allstats
            • Будь-який період - #`/stats from 2025-05-01 to 2025-05-25#`
meme:
