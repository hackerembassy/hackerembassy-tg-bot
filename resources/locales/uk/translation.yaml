            - Доступні іменовані чати: {{chatsList}}
            - Дізнатися id поточного чату: /chatid
        nochat: Вказаний чат не знайдено
        success: Повідомлення скопійовано до {{target}}
    save:
        help: |
            📝 Зберегти повідомлення, на яке ви відповідаєте, в чат з ботом

            #`/save#`
            #`/save message_id#`

            👀 Ця дія може бути залогована
