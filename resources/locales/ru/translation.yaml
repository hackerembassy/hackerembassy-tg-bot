            #`/setemoji status#` - Посмотреть свой установленный в боте эмодзи
            #`/setemoji remove#` - Удалить свой эмодзи из бота
        fail: ⚠️ Укажите валидный эмодзи.
        set: 🐥 Эмодзи {{emoji}} успешно установлен для юзера {{username}}.
        removed: 🗑 Эмодзи удален для юзера {{username}}.
        isset: 🐥 Для юзера {{username}} задан эмодзи {{emoji}}.
        isnotset: 🐥 Эмодзи не задан для юзера {{username}}.
    statsof: "🕔 {{username}} за время существования бота (с Января 2023) провел(-а) в спейсе (на основе отметок)"
    stats:
        start: "🕔 За время существования бота (c января 2023) эти юзеры провели в спейсе (на основе отметок)"
        invaliddates: "🕔 Не могу понять даты, попробуй в формате YYYY-MM-DD"
        nousertimes: "📭 За этот период отметки не найдены"
        hoursinspace: "Часов проведено в спейсе c {{from.day}}/{{from.month}}/{{from.year}} по {{to.day}}/{{to.month}}/{{to.year}}"
        period: "🕔 C {{from.day}}/{{from.month}}/{{from.year}} по {{to.day}}/{{to.month}}/{{to.year}} эти юзеры провели в спейсе (на основе отметок)"
        tryautoinside: |
            📲 Хочешь знать точную статистику о себе? Не забывай отмечаться с помощью /in и /out, а лучше используй /autoinside, чтобы делать это автоматически
        help: |
            ℹ️ Команды статистики:
            • Текущий месяц - /month
            • Предыдущий месяц - /lastmonth
            • За время существования бота - /allstats
            • Любой период - #`/stats from 2023-05-01 to 2023-05-25#`
