basic:
    help: "{{availableCommands}}{{globalModifiers}}"
    about: |
        🏫 Hacker Embassy (Ереванский Хакерспейс) - это пространство, где собираются единомышленники, увлеченные технологиями и творчеством. Мы вместе работаем над проектами, делимся идеями и знаниями, просто общаемся.

        💻 Ты можешь почитать о нас подробнее на нашем сайте https://hackem.cc/

        📓 Информацию о наших проектах, оборудовании и правилах мы храним на нашей вики https://lore.hackem.cc/

        🤖 Мой код открыт и свободен, разработка ведётся на гитхабе: https://github.com/hackerembassy/hackerembassy-tg-bot

        🍕 Мы всегда рады новым резидентам. Хочешь узнать, как стать участником? Жми команду /join
    issue:
        space:
            help: |
                📮 С помощью этой команды можно #*анонимно#* сообщить о какой-либо проблеме в спейсе (чего-то не хватает, что-то не работает, кто-то делает что-то очень неправильное в спейсе).
                Резиденты обязательно её рассмотрят и постараются решить.

                Отправить боту проблему можно, например, вот так:
                #`/issue Плохо работает кондиционер и на первом этаже очень жарко#`
                #`/issue Закончилась туалетная бумага#`
                #`/issue Неплохо было бы иметь карту внутренней сети на вики#`

                Если проблема касается бота, то лучше воспользоваться командой /bug
            sent: 💌 Проблема отправлена резидентам, они обязательно её рассмотрят. Спасибо за помощь нашему сообществу.
            report: |
                📩 У вас новая проблема!

                "{{issue}}"
        bot:
            help: |
                📮 С помощью этой команды можно сообщить о баге в боте.

                Можно создать новую issue на гитхабе, если такой еще нет. Или можно отправить багрепорт прямо в телеграме, например, вот так:
                #`/bug Меня не чекинит автоматически, когда я прихожу в спейс#`

                #*Username пользователя будет автоматически добавлен#* к сообщению, чтобы резиденты могли связаться с вами, если им потребуется дополнительная информация.

                Если проблема касается самого спейса или его гостей, то лучше воспользоваться командой /issue
            sent: 💌 Багрепорт отправлен мейнтейнерам, они обязательно его рассмотрят. Спасибо за помощь нашему сообществу.
            report: |
                📩 У {{reporter}} есть появилась проблема с ботом! Возможно баг?

                "{{issue}}"
        buttons:
            new: Создать на гитхабе
            current: Issues на гитхабе
    residents: |
        👥 Вот они, наши великолепные резиденты:

        {{userList}}
        🧠 Вы можете обратиться к ним по любому спейсовскому вопросу
    location:
        address: |
            🏫 Наш адрес: Армения, Ереван, проспект Баграмяна 60 (вход с улицы)
    donate: |
        💸 Хакспейс не является коммерческим проектом и существует исключительно на пожертвования участников.
        Мы вносим свой вклад в развитие спейса: оплата аренды и коммуналки, забота о пространстве, помощь в приобретении оборудования.
        Мы будем рады любой поддержке.

        🫶 Начиная с определенной суммы донатов за последние {{period}} месяца вы получаете статус нашего спонсора:
        {{sponsorshipTierList}}

        Задонатить нам можно следующими способами:
        💵 Наличкой при встрече (самый лучший вариант)
          {{donateCashCommand}}
        💰 Криптовалюта
          {{cryptoCommands}}
        💳 Банковская карта Visa/Mastercard Армении
          {{donateCardCommand}}
        🛠 Полезное оборудование или расходники
          {{donateEquipmentCommand}}

        📊 Увидеть наши текущие сборы и ваш вклад можно по команде {{fundsCommand}}

        💌 По вопросам доната обращайтесь к нашим бухгалтерам, они помогут:
        {{accountantsList}}
    donateCoin: |
        🪙 Используй этот QR код или адрес ниже, чтобы задонатить нам в {{coin.fullname}}.

        ⚠️ Обрати внимание, что сеть {{coin.network}} и ты используешь правильный адрес:
        #`{{coin.address}}#`

        💌 Не забудь написать бухгалтеру перед своим донатом и скинуть код транзакции или ссылку
        в {{coin.explorer}} или аналогичном сервисе после

        🛍 Если хочешь задонатить натурой (ohh my) или другим способом - жми /donate
    donateCash: |
        💌 Для того, чтобы задонатить этим способом, напишите нашим бухгалтерам. С ними вы сможете договориться о времени и месте передачи.

        Вот они: {{accountantsList}}

        Также, вы можете бросить анонимный донат в бокс на первом этаже.

        🛍 Если хочешь задонатить натурой (ohh my) или другим способом - жми /donate
    donateCard: |
        💌 Вы можете перевести деньги на один из предложенных реквизитов:

        🏢 По номеру счёта: #`{{accountNumber}}#`, #`{{accountHolder}}#`

        💳 По номеру карты: {{cardNumber}}

        Чтобы ваш донат не потерялся, свяжитесь с одним из наших бухгалтеров. Также, вы можете уточнить с ними альтернативный способ донейта.

        Вот они: {{accountantsList}}

        🛍 Если хочешь задонатить натурой (ohh my) или другим способом - жми /donate
    donateEquipment: |
        🛠 Если у тебя дома завалялся лишний 3d принтер, паяльник или другое полезное(!) оборудование, и ты готов пожертвовать его спейсу (или расшарить для общего пользования у нас) мы будем очень благодарны принять его.

        🗑 Важно, чтобы оборудование или расходники были в рабочем состоянии или требовали минимального ремонта и при этом не принадлежали к категории "хлам".

        🧙‍♀️ Обращайся к нашим резидентам, они помогут с принятием оборудования и решением всех вопросов.
    join: |
        🧑🏻‍🏫 Если вы находитесь в Ереване, увлечены технологиями и ищете единомышленников, заходите к нам.
        - Мы проводим регулярный день открытых дверей каждую пятницу в 20.00.
        - По воскресеньям в 20.00 у нас проходит English Club, где можно попрактиковать свой английский.
        - Часто по понедельникам в 20.00 мы проводим музыкальные встречи: приносим гитары, играем в Rocksmith и джемим.
        - В любой другой день спейс тоже может принять гостей, вводи команду {{statusCommand}} чтобы узнать открыт ли спейс и есть ли там кто-нибудь.

        💸 Посещения свободные (бесплатные), но любые донаты на помощь нашим проектам и аренду очень приветствуются.
        Подробнее можно узнать по команде {{donateCommand}}

        🗺 Чтобы узнать, как нас найти, жми {{locationCommand}}

        🔑 Если вы хотите стать постоянным участником - полноценным резидентом сообщества, т.е. иметь свой ключ, своё место для хранения вещей (инструменты, сервера и.т.п.), участвовать в принятии решений о развитии спейса,\
        то наши требования просты:
        - Дружелюбность и неконфликтность.
        - Готовность участвовать в жизни сообщества.
        - Регулярные пожертвования (естественно, в рамках ваших возможностей).

        🧙🏻‍♂️ Обратитесь к любому резиденту спейса, он представит вашу кандидатуру Совету Спейса.
    events:
        text: |
            🎭 Что у нас происходит:
            - Мастерклассы и презентации на различные темы от 3D печати, моделирования и пайки до нейросетей, алгоритмов доказательства теорем и шибари. Дату анонсируем заранее в чатике.
            - Часто по понедельникам в 21.00 мы проводим музыкальные встречи: приносим гитары, играем в Rocksmith и джемим.
            - Каждую пятницу в 20.00 у нас традиционный день открытых дверей, общаемся, знакомимся и тусим.
            - В любой другой день спейс тоже может принять гостей, смотри status спейса, чтобы узнать больше.

            💸 Посещения свободные (бесплатные), но любые донаты на помощь нашим проектам и аренду очень приветствуются.
        calendar: |
            🗓 За нашими мероприятиями можно следить в календарике
            {{calendarLink}}
            Подпишись плюсиком ➕ внизу страницы или возьми {{iCalLink}}
            Или вообще открой календарь прямо в телеге {{openCalendarInTelegram}}
            Ближайшие мероприятия можно узнать по команде /upcoming, сегодняшние - по команде /today
        buttons:
            today: 📣 Сегодня
            upcoming: 📆 Ближайшие
        opencalendar: Открыть календарь
        upcoming: |
            🗓 Наши ближайшие мероприятия:
        today: |
            📣 Сегодня в спейсе проходят мероприятия:
        todaysimple: |
            Сегодня в спейсе:
        entrance: |
            🎁 Вход как всегда свободный, но мы будем рады любым донатам на поддержку пространства.
        notoday: |
            🏖 Сегодня в спейсе запланированных мероприятий нет.

            Но, если спейс открыт для гостей, то можно просто приходить позаниматься интересными проектами или потусить. Смотри /status в течение дня.
        error: 📂 Мероприятия не найдены
    start:
        text: |
            🇬🇧 Привет хакерчанин. Я бот для менеджмента всяких процессов в спейсе.
            [Я нахожусь в разработке, ты можешь поучаствовать в моем развитии в репозитории на гитхабе спейса, обращайся к #[korn9509#]#(t.me/korn9509#)].

            🔖 Для получения полного списка команд доступных тебе вводи /help. Некоторые команды видны только резидентам.
            📮 Что-то в спейсе не так? Вводи в боте /issue. Это анонимно.
            🐞 Нашел баг в боте? Вводи /bug.
            🗣 Change bot language / Сменить язык бота - /lang
        buttons:
            status: 📯 Статус
            events: 🗓 Мероприятия
            funds: 💸 Сборы
            control: 🕹 Управление
            info: 📚 Инфа
            birthdays: 🎉 Дни рождения
