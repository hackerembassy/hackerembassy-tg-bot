            📌 При увімкненій фічі актуальний статус пристрою в мережі має пріоритет над ручними командами входу/виходу.
            ⚠️ Для роботи обов'язково задайте MAC адреси вашого пристрою та вимкніть його рандомізацію для мережі спейса.
        ghost: "#`/autoinside ghost#` - Відмічатися тільки для резидентів"
        fail: ⚠️ Не вдалося увімкнути автовхід, хоча MAC заданий. Хтось, накостиляйте моєму розробнику.
        nomac: |
            ⚠️ Твоя MAC адреса не задана. Додай її командою /mac
        set: 🕺 Автовхід та автовихід активовані для користувача {{username}} на MAC адресу {{usermac}}
        removed: 🚷 Автовхід та автовихід вимкнені для користувача {{username}}
        isset: 🕺 Автовхід та автовихід увімкнені для користувача {{username}} на MAC адресу {{usermac}}
        isghost: 👻 Автовхід та автовихід увімкнені для користувача {{username}} на MAC адресу {{usermac}} тільки для резидентів
        isnotset: 🚷 Автовхід та автовихід вимкнені для користувача {{username}}
        nouser: ⚠️ Твого користувача не знайшлося в базі (баг?)
        notsupported: ⚠️ Ця команда поки не підтримується для користувачів без юзернейму
    status:
        undefined: 🔐 Статус спейса невизначений. Відкрийте його хтось за допомогою /open
        noconnection: |
            📵 Не вдалося зв'язатися зі спейсом. Дані про відвідувачів можуть бути неактуальними.

            {{statusMessage}}
        messageopened: Чудовий привід зайти, тож дзвоніть у дзвінок або пишіть тим, хто всередині - вам відкриють
        messageclosed: Чекаємо, поки хтось із резидентів його відкриє. Може всередині відбувається закрите зібрання резидентів, або вони знову забули зробити /open? Хто знає... Краще запитай у них в чаті або тегни їх командою /hey якщо вони забули про чат.
        updated: ⏱ Оновлено {{updatedDate}}
        opened: "#*відкритий#*"
        closed: "#*закритий#*"
        state: |
            {{stateEmoji}} Спейс {{state}} для гостей {{changedBy}}

            {{stateMessage}}

        state_pin: "{{stateEmoji}} {{state}}"
        insidechecked_pin: "👨‍💻 всередині {{count}}"
        insidechecked: |
            👨‍💻 Всередині відмітились [{{count}}]:
        nooneinside: 🛌 Всередині ніхто не відмітився
        nooneinside_pin: 🛌 нікого
        going_pin: "🚕 планують {{count}}"
        going: |
            🚕 Планують сьогодні зайти [{{count}}]:
    open: |
        🔑 Спейс #*відкритий#* для гостей {{username}}. Чудовий привід зайти!
    open-alert: 🔑 Спейс був відкритий користувачем {{user}}
    close: |
        🔒 Спейс #*закритий#* {{username}}. Всі відмічені відправлені додому.
    close-alert: 🔒 Спейс був закритий користувачем {{user}}
    evict: 🔒 Список відмічених очищено.
    in:
        notready: 🔐 Зараз спейс не готовий прийняти гостей... або резиденти знову забули зробити /open
        gotin: 🤝 {{username}} тепер у спейсі
        until: " до {{until}}"
        tryautoinside: 📲 Спробуй команду /autoinside щоб відмічатися у спейсі автоматично.
    out:
        shouldnot: 🔐 А тебе і так немає у списку відмічених (коли спейс закривають, він очищається)
        gotout: 👋 {{username}} тепер не у спейсі. Сподіваємось, що ще повернеться...
    inforce:
        notready: 🔐 Вибач, ти не можеш зараз привести цю людину.
        gotin: 🟢 {{memberusername}} привів(ла) {{username}} у спейс
    outforce:
