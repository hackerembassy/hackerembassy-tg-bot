topics:
    general:
        error: ⚠️ Щось пішло не так
        notfound: ⚠️ Топік не знайдено
        empty: Поки нічого немає
        nosubscribers: 🌚 Немає підписників на топік {{topic}}
    buttons:
        topics: 🗃 Всі топіки
        subscriptions: 💌 Підписки
    topics:
        list: |
            📭 За допомогою цієї фічі можна підписатися на розсилку за цікавими для тебе топіками.
            Автори топіка зможуть легко згадувати тебе в групових чатах і надсилати тобі особисті сповіщення.

            🗃 Список доступних топіків:
            {{topics}}

            📟 Команди:
            Подивитися список доступних топіків - /topics
            Подивитися поточні підписки - /subscriptions
            Підписатися на розсилку - #`/subscribe topicname#`
            Відписатися від розсилки - #`/unsubscribe topicname#`
            Тегнути всіх підписників топіка - #`/tag topicname#`
        member: |
            📯 Команди резидентів:
            Додати топік - #`/addtopic topicname topicdescription#`
            Видалити топік - #`/removetopic topicname#`
            Особисті повідомлення підписникам - #`/notify topicname message#`
    subscriptions:
        list: |
            📭 Ти підписаний на такі топіки:
            {{topics}}

            📟 Команди:
            Подивитися список доступних топіків - /topics
            Відписатися від розсилки - #`/unsubscribe topicname#`
        empty: 🗿 Ти не підписаний на жоден топік
    subscribe:
        success: |
            📭 Підписка на топік {{topic}} оформлена

            📟 Мої підписки - /subscriptions
        already: |
            👌 Ти вже підписаний на топік {{topic}}

            📟 Мої підписки - /subscriptions
        fail: ⚠️ Не вдалося підписатися на топік {{topic}}
    unsubscribe:
        success: |
            🗑 Підписка на топік {{topic}} видалена

            📟 Мої підписки - /subscriptions
        notsubscribed: |
            🙅‍♀️ Ти не підписаний на топік {{topic}}

            📟 Мої підписки - /subscriptions
        fail: ⚠️ Не вдалося відписатися від топіка {{topic}}. А ти точно був підписаний?
    add:
        success: 📭 Топік {{topic}} додано
        exists: 👌 Топік {{topic}} вже існує
        fail: ⚠️ Не вдалося додати топік {{topic}}
    delete:
        success: 🗑 Топік {{topic}} видалено
        fail: ⚠️ Не вдалося видалити топік {{topic}}
    notify:
        help: |
            📭 За допомогою цієї команди можна надіслати особисті повідомлення всім підписникам топіка
            #`/notify topicname message#`
        message: |
            📭 Вам повідомлення з топіка {{topic}}:

            {{text}}

            📟 Мої підписки - /subscriptions
        started: 📯 Розсилка підписникам {{topic}} розпочата. Особисті повідомлення отримають {{count}} підписників протягом {{eta}} секунд
        finished: ✅ Розсилка підписникам {{topic}} завершена. Особисті повідомлення успішно отримали {{received}}/{{count}} підписників
